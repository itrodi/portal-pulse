      if (zoneJump) {
        zoneJump.addEventListener("touchstart", (e) => {
          e.preventDefault();
          if (!audioCtx) getAudioCtx();
          for (const t of e.changedTouches) {
            activeTouches[t.identifier] = { zone: "jump", startX: t.clientX, startY: t.clientY, startTime: Date.now() };
          }
          // Tap = jump
          pressed["Space"] = true;
          keys["Space"] = true;
        }, { passive: false });
        zoneJump.addEventListener("touchmove", (e) => {
          e.preventDefault();
          for (const t of e.changedTouches) {
            const info = activeTouches[t.identifier];
            if (!info) continue;
            const dx = t.clientX - info.startX;
            const dy = t.clientY - info.startY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            // Swipe detection: >30px horizontal movement = dash
            if (dist > 30 && Math.abs(dx) > Math.abs(dy) && !info.dashed) {
              info.dashed = true;
              pressed["ShiftLeft"] = true;
              // Set facing based on swipe direction
              if (dx > 0) { keys["ArrowRight"] = true; info.swipeDir = "right"; }
              else { keys["ArrowLeft"] = true; info.swipeDir = "left"; }
            }
          }
        }, { passive: false });
        zoneJump.addEventListener("touchend", (e) => {
          e.preventDefault();
          keys["Space"] = false;
          for (const t of e.changedTouches) {
            const info = activeTouches[t.identifier];
            if (info && info.swipeDir) {
              if (info.swipeDir === "right") keys["ArrowRight"] = false;
              else keys["ArrowLeft"] = false;
            }
            delete activeTouches[t.identifier];
          }
        }, { passive: false });
        zoneJump.addEventListener("touchcancel", (e) => {
          keys["Space"] = false;
          for (const t of e.changedTouches) {
            const info = activeTouches[t.identifier];
            if (info && info.swipeDir) {
              if (info.swipeDir === "right") keys["ArrowRight"] = false;
              else keys["ArrowLeft"] = false;
            }
            delete activeTouches[t.identifier];
          }
        });
      }

      // Canvas-level touch for menu screens
      canvas.addEventListener("touchstart", (e) => {
        if (!audioCtx) getAudioCtx();
        const { x: tx, y: ty } = getCanvasCoords(e.touches[0]);

        if (state === "title") {
          e.preventDefault();
          pressed["Space"] = true;
        } else if (state === "charSelect") {
          e.preventDefault();
          const startX = (canvas.width - (4 * 40)) / 2 + 12;
          const charY = 200;
          for (let i = 0; i < 4; i++) {
            const cx = startX + i * 40;
            if (tx >= cx - 10 && tx <= cx + 26 && ty >= charY - 15 && ty <= charY + 45) {
              selectedChar = i;
              haptic();
            }
          }
          if (ty > 275 && ty < 330) {
            pressed["Space"] = true;
          }
        } else if (state === "dead" || state === "gameComplete") {
          e.preventDefault();
          pressed["KeyR"] = true;
        } else if (state === "paused") {
          e.preventDefault();
          // Top half = resume, bottom half = restart
          if (ty < canvas.height / 2) pressed["Escape"] = true;
          else pressed["KeyR"] = true;
        }
      }, { passive: false });

      // === SDK ===
      setupSDK();
      window.addEventListener("load", setupSDK);

      // === DEBUG/TEST HOOKS ===
      window.advanceTime = (ms) => {
        manualAdvance = true;
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let i = 0; i < steps; i++) {
          update(1 / 60);
        }
        draw();
      };

      window.render_game_to_text = () => {
        const config = LEVELS[levelIndex % LEVELS.length];
        const payload = {
          mode: state,
          level: levelIndex + 1,
          levelCount: LEVELS.length,
          world: WORLDS[config.world].name,
          coords: "origin top-left, +x right, +y down (pixels)",
          player: player
            ? {
                x: Math.round(player.x),
                y: Math.round(player.y),
                vx: Number(player.vx.toFixed(2)),
                vy: Number(player.vy.toFixed(2)),
                onGround: player.onGround,
                character: CHAR_NAMES[selectedChar],
              }
            : null,
          camera: { x: Math.round(cameraX), y: Math.round(cameraY) },
          health: { current: hp, max: maxHp, invuln: Number(invuln.toFixed(2)) },
          dash: { ready: dashCharge > 0, timer: Number(player?.dashTimer?.toFixed(2) ?? 0) },
          coins: { collected: coinsCollected, needed: coinsNeeded, total: coinsTotal },
          score,
          portalLocked: coinsCollected < coinsNeeded,
          time: Number(levelElapsed.toFixed(2)),
          enemies: enemies.map((e) => ({ x: Math.round(e.x), y: Math.round(e.y), dir: e.dir, type: e.type })),
          saws: saws.length,
          movingPlatforms: movingPlatforms.length,
          gems: gems.filter((g) => !g.collected).length,
          boss: boss ? { hp: boss.hp, maxHp: boss.maxHp, phase: boss.phase, stunned: boss.stunned } : null,
          wallSliding,
          combo: comboCount,
        };
        return JSON.stringify(payload);
      };

      // === INIT ===
      const tilemap = new Image();
      tilemap.src = "Default/Tilemap/tilemap_packed.png";

      let lastTime = 0;

      tilemap.onload = () => {
        saveData = loadSaveFromSDK();
        state = "title";
        resetGame();
        setCanvasScale();
        requestAnimationFrame(gameLoop);
      };
    })();
  </script>
</body>
