<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0" />
  <title>Portal Pulse</title>
  <script src="https://cdn.jsdelivr.net/npm/@remix-gg/sdk@latest/dist/index.min.js"></script>
  <style>
    :root {
      --bg: #f6cfa7;
      --frame: #2b2b2b;
      --text: #2b2b2b;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 10%, #ffe6c7, var(--bg));
      color: var(--text);
      font-family: "Trebuchet MS", Tahoma, sans-serif;
    }
    #wrap {
      position: relative;
      padding: 10px;
      border: 3px solid var(--frame);
      background: rgba(255, 255, 255, 0.6);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }
    canvas {
      display: block;
      background: var(--bg);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    #touch-controls {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      pointer-events: none;
    }
    .touch-btn {
      position: absolute;
      pointer-events: auto;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 12px;
      background: rgba(0,0,0,0.2);
      color: rgba(255,255,255,0.7);
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .touch-btn:active { background: rgba(255,255,255,0.3); }
    #btn-left { bottom: 10px; left: 10px; width: 56px; height: 56px; }
    #btn-right { bottom: 10px; left: 76px; width: 56px; height: 56px; }
    #btn-jump { bottom: 10px; right: 10px; width: 64px; height: 64px; }
    #btn-dash { bottom: 10px; right: 84px; width: 56px; height: 56px; }
    @media (pointer: coarse) {
      #touch-controls { display: block; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="320" height="480"></canvas>
    <div id="touch-controls">
      <div class="touch-btn" id="btn-left">&larr;</div>
      <div class="touch-btn" id="btn-right">&rarr;</div>
      <div class="touch-btn" id="btn-dash">D</div>
      <div class="touch-btn" id="btn-jump">&uarr;</div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      const TILE_SIZE = 16;
      const GRID_H = 30;

      // === TILE CONSTANTS ===
      // Ground
      const TILE_GROUND_FILL = 17;
      const TILE_GROUND_TOP_ORANGE = 34;
      const TILE_GROUND_TOP_PINK = 41;
      const TILE_GROUND_TOP_PURPLE = 35;
      const TILE_GROUND_TOP_LAVENDER = 42;
      const TILE_GROUND_FILL_CAVE = 36;
      const TILE_GROUND_TOP_LAVA_A = 45;
      const TILE_GROUND_TOP_LAVA_B = 48;
      const TILE_GROUND_FILL_LAVA = 46;

      // Hazards
      const TILE_SPIKE = 110;
      const TILE_SAW = 111;

      // Collectibles
      const TILE_COIN = 88;
      const TILE_GEM_BLUE = 83;
      const TILE_GEM_PINK = 84;
      const TILE_GEM_RED = 85;

      // Characters
      const TILE_PLAYER = 105;
      const CHARACTERS = [105, 106, 107, 108];
      const CHAR_NAMES = ["Blaze", "Frost", "Wave", "Leaf"];

      // Enemies
      const TILE_ENEMY = 109;
      const TILE_ENEMY_FLY = 91;
      const TILE_ENEMY_FAST = 97;

      // Structures
      const TILE_PORTAL = 120;
      const TILE_PORTAL_LOCK = 67;
      const TILE_FLAG = 73;
      const TILE_SPRING = 15;

      // UI
      const TILE_HEART_FULL = 132;
      const TILE_HEART_EMPTY = 134;
      const TILE_STAR = 147;
      const TILE_STAR_EMPTY = 149;

      // Decorations
      const TILE_CLOUD = 81;
      const TILE_CLOUD_SMALL = 82;
      const TILE_TREE_ORANGE = 31;
      const TILE_TREE_PINK = 38;
      const TILE_BUSH = 80;
      const TILE_CRYSTAL_A = 98;
      const TILE_CRYSTAL_B = 100;
      const TILE_MUSHROOM = 89;
      const TILE_TORCH = 99;

      // Water/Lava
      const TILE_WATER_LEFT = 116;
      const TILE_WATER_MID = 117;
      const TILE_WATER_EDGE = 118;
      const TILE_WATER_EDGE_RIGHT = 119;

      // Moving platform tile
      const TILE_PLATFORM_BLOCK = 47;

      const DIGIT_TILES = [135, 136, 137, 138, 139, 140, 141, 142, 143, 144];

      // === PHYSICS ===
      const GRAVITY = 1100;
      const MOVE_ACCEL = 900;
      const MAX_SPEED = 180;
      const FRICTION = 0.85;
      const JUMP_SPEED = 480;
      const COYOTE_TIME = 0.12;
      const JUMP_BUFFER = 0.14;
      const DASH_SPEED = 420;
      const DASH_TIME = 0.14;
      const SPRING_BOOST = 620;

      // === WORLD THEMES ===
      const WORLDS = [
        {
          name: "Grasslands",
          bg: "#f6cfa7",
          groundTops: [TILE_GROUND_TOP_ORANGE, TILE_GROUND_TOP_PINK],
          groundFill: TILE_GROUND_FILL,
          trees: [TILE_TREE_ORANGE, TILE_TREE_PINK],
          bush: TILE_BUSH,
          gemTile: TILE_GEM_BLUE,
        },
        {
          name: "Crystal Caves",
          bg: "#c4b5e3",
          groundTops: [TILE_GROUND_TOP_PURPLE, TILE_GROUND_TOP_LAVENDER],
          groundFill: TILE_GROUND_FILL_CAVE,
          trees: [TILE_CRYSTAL_A, TILE_CRYSTAL_B],
          bush: TILE_GEM_PINK,
          gemTile: TILE_GEM_PINK,
        },
        {
          name: "Lava Realm",
          bg: "#e8a88c",
          groundTops: [TILE_GROUND_TOP_LAVA_A, TILE_GROUND_TOP_LAVA_B],
          groundFill: TILE_GROUND_FILL_LAVA,
          trees: [TILE_MUSHROOM, TILE_TORCH],
          bush: TILE_MUSHROOM,
          gemTile: TILE_GEM_RED,
        },
      ];

      // === 30 LEVELS ===
      const LEVELS = Array.from({ length: 30 }, (_, i) => {
        const world = Math.floor(i / 10);
        const lvlInWorld = i % 10;
        return {
          length: 360 + lvlInWorld * 45 + world * 30,
          seed: 1200 + i * 97,
          difficulty: 0.85 + i * 0.07,
          world: world,
        };
      });

      // === INPUT ===
      const keys = {};
      const pressed = {};

      // === GAME STATE ===
      let muted = false;
      let levelW = 0;
      let worldW = 0;
      let worldH = GRID_H * TILE_SIZE;

      let solid = [];
      let groundTop = [];
      let coins = [];
      let hazards = [];
      let enemies = [];
      let springs = [];
      let checkpoints = [];
      let hearts = [];
      let stars = [];
      let decorBack = [];
      let decorFront = [];
      let portal = null;
      let saws = [];
      let gems = [];
      let movingPlatforms = [];

      let player = null;
      let respawn = { x: 0, y: 0 };
      let cameraX = 0;
      let cameraY = 0;
      let shakeTime = 0;
      let shakeStrength = 0;

      let score = 0;
      let dashCharge = 0;
      let levelIndex = 0;
      let state = "loading";
      let levelTimer = 0;
      let levelElapsed = 0;
      let gameOverSent = false;
      let coinsCollected = 0;
      let coinsTotal = 0;
      let coinsNeeded = 0;
      let gameTime = 0;

      const maxHp = 3;
      let hp = maxHp;
      let invuln = 0;

      let manualAdvance = false;
      let selectedChar = 0;
      let charSelectBlink = 0;

      // === UTILITY ===
      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function mulberry32(seed) {
        let t = seed >>> 0;
        return () => {
          t += 0x6d2b79f5;
          let r = Math.imul(t ^ (t >>> 15), 1 | t);
          r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
          return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
        };
      }

      function rectsOverlap(a, b) {
        return (
          a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y
        );
      }

      function haptic() {
        if (window.RemixSDK && window.RemixSDK.hapticFeedback) {
          window.RemixSDK.hapticFeedback();
        }
      }

      function sendGameOver() {
        if (gameOverSent) return;
        gameOverSent = true;
        if (window.RemixSDK && window.RemixSDK.singlePlayer && window.RemixSDK.singlePlayer.actions) {
          window.RemixSDK.singlePlayer.actions.gameOver({ score });
        }
      }

      function setupSDK() {
        if (window.RemixSDK && window.RemixSDK.onPlayAgain) {
          window.RemixSDK.onPlayAgain(() => {
            resetGame();
          });
        }
        if (window.RemixSDK && window.RemixSDK.onToggleMute) {
          window.RemixSDK.onToggleMute((data) => {
            muted = !!(data && data.isMuted);
          });
        }
        if (window.FarcadeSDK && window.FarcadeSDK.onToggleMute) {
          window.FarcadeSDK.onToggleMute((data) => {
            muted = !!(data && data.isMuted);
          });
        }
      }

      function setCanvasScale() {
        const scale = Math.min(
          window.innerWidth / canvas.width,
          window.innerHeight / canvas.height
        );
        canvas.style.width = Math.floor(canvas.width * scale) + "px";
        canvas.style.height = Math.floor(canvas.height * scale) + "px";
      }

      // === LEVEL GENERATION ===
      function generateLevel(config) {
        const rng = mulberry32(config.seed);
        const difficulty = config.difficulty;
        const worldIdx = config.world;
        const world = WORLDS[worldIdx];

        const gapChance = 0.06 + difficulty * 0.015;
        const spikeChance = 0.10 + difficulty * 0.02;
        const enemyChance = 0.05 + difficulty * 0.015;
        const platformChance = 0.32 + difficulty * 0.04;
        const springChance = 0.03 + difficulty * 0.01;
        const heartChance = 0.015;
        const starChance = 0.04;
        const sawChance = worldIdx >= 1 ? 0.02 + difficulty * 0.01 : 0.005;
        const flyEnemyChance = worldIdx >= 1 ? 0.03 + difficulty * 0.01 : 0;
        const fastEnemyChance = worldIdx >= 2 ? 0.03 + difficulty * 0.01 : 0.005;
        const gemChance = 0.02 + worldIdx * 0.015;
        const movPlatChance = 0.015 + worldIdx * 0.01;

        levelW = config.length;
        worldW = levelW * TILE_SIZE;
        worldH = GRID_H * TILE_SIZE;

        solid = Array.from({ length: GRID_H }, () => Array(levelW).fill(false));
        groundTop = Array(levelW).fill(world.groundTops[0]);
        coins = [];
        hazards = [];
        enemies = [];
        springs = [];
        checkpoints = [];
        hearts = [];
        stars = [];
        decorBack = [];
        decorFront = [];
        portal = null;
        saws = [];
        gems = [];
        movingPlatforms = [];

        const baseY = 24;
        const minY = 18;
        const maxY = 25;
        const floorHeights = Array(levelW).fill(baseY);
        const gaps = [];
        const starterCoins = [];

        // Generate floor terrain
        let x = 0;
        let floorY = baseY;
        while (x < levelW) {
          if (x < 10 || x > levelW - 12) {
            floorHeights[x] = baseY;
            x++;
            continue;
          }
          const roll = rng();
          if (roll < gapChance) {
            const gapLen = 2 + Math.floor(rng() * 3);
            for (let i = 0; i < gapLen && x + i < levelW; i++) {
              floorHeights[x + i] = null;
            }
            gaps.push({ x, len: gapLen });
            x += gapLen;
            continue;
          }
          if (roll < gapChance + 0.15) {
            floorY += rng() < 0.5 ? -1 : 1;
            floorY = clamp(floorY, minY, maxY);
          }
          floorHeights[x] = floorY;
          x++;
        }

        // Starter gap for teaching
        const starterX = 18;
        if (starterX + 2 < levelW && floorHeights[starterX] !== null) {
          floorHeights[starterX] = null;
          floorHeights[starterX + 1] = null;
          gaps.push({ x: starterX, len: 2 });
          if (floorHeights[starterX - 1] !== null) {
            starterCoins.push({ x: starterX - 1, y: floorHeights[starterX - 1] - 2, collected: false });
          }
        }

        // Theme bands for ground tops
        for (let i = 0; i < levelW; i++) {
          const themeBand = Math.floor(i / 40) % 2;
          groundTop[i] = world.groundTops[themeBand];
        }

        // Fill solid ground
        for (let gx = 0; gx < levelW; gx++) {
          const fy = floorHeights[gx];
          if (fy === null) continue;
          for (let y = fy; y < GRID_H; y++) {
            solid[y][gx] = true;
          }
        }

        // Generate floating platforms with coins
        for (let gx = 12; gx < levelW - 20; gx += 8 + Math.floor(rng() * 10)) {
          if (rng() > platformChance) continue;
          const base = floorHeights[gx] ?? baseY;
          const height = 3 + Math.floor(rng() * 3);
          const py = clamp(base - height, 6, baseY - 2);
          const len = 4 + Math.floor(rng() * 6);
          for (let px = gx; px < gx + len && px < levelW; px++) {
            solid[py][px] = true;
            if (rng() < 0.55) {
              coins.push({ x: px, y: py - 1, collected: false });
            }
          }
          if (rng() < starChance) {
            stars.push({ x: gx + Math.floor(len / 2), y: py - 2, collected: false });
          }
          // Gems on platforms
          if (rng() < gemChance) {
            gems.push({ x: gx + Math.floor(len / 2), y: py - 1, collected: false, tile: world.gemTile });
          }
        }

        // Ground-level entities with overlap prevention
        const usedTiles = new Set();
        for (let gx = 8; gx < levelW - 8; gx++) {
          const fy = floorHeights[gx];
          if (fy === null) continue;
          const tileKey = `${gx},${fy - 1}`;

          if (gx > 12 && gx < levelW - 12 && rng() < spikeChance && !usedTiles.has(tileKey)) {
            hazards.push({ x: gx, y: fy - 1 });
            usedTiles.add(tileKey);
          } else if (rng() < sawChance && !usedTiles.has(tileKey)) {
            // Saw blade - moves horizontally
            const sawMinX = Math.max(0, (gx - 4)) * TILE_SIZE;
            const sawMaxX = Math.min(levelW - 1, (gx + 4)) * TILE_SIZE;
            saws.push({
              x: gx * TILE_SIZE,
              y: (fy - 1) * TILE_SIZE,
              dir: rng() > 0.5 ? 1 : -1,
              speed: 50 + difficulty * 15,
              minX: sawMinX,
              maxX: sawMaxX,
              angle: 0,
            });
            usedTiles.add(tileKey);
          } else if (rng() < springChance && !usedTiles.has(tileKey)) {
            springs.push({ x: gx, y: fy - 1 });
            usedTiles.add(tileKey);
          } else if (rng() < flyEnemyChance && !usedTiles.has(tileKey)) {
            // Flying enemy - sine wave vertical movement
            enemies.push({
              x: gx * TILE_SIZE + 1,
              y: (fy - 3) * TILE_SIZE + 2,
              w: TILE_SIZE - 2,
              h: TILE_SIZE - 2,
              dir: rng() > 0.5 ? 1 : -1,
              speed: 35 + difficulty * 6,
              minX: (gx - 5) * TILE_SIZE,
              maxX: (gx + 5) * TILE_SIZE,
              type: "fly",
              baseY: (fy - 3) * TILE_SIZE + 2,
              flyTimer: rng() * Math.PI * 2,
              flyAmplitude: 24 + rng() * 16,
            });
            usedTiles.add(tileKey);
          } else if (rng() < fastEnemyChance && !usedTiles.has(tileKey)) {
            // Fast enemy - wider patrol, faster
            enemies.push({
              x: gx * TILE_SIZE + 1,
              y: (fy - 1) * TILE_SIZE + 2,
              w: TILE_SIZE - 2,
              h: TILE_SIZE - 2,
              dir: rng() > 0.5 ? 1 : -1,
              speed: 75 + difficulty * 12,
              minX: (gx - 7) * TILE_SIZE,
              maxX: (gx + 7) * TILE_SIZE,
              type: "fast",
              baseY: 0,
              flyTimer: 0,
              flyAmplitude: 0,
            });
            usedTiles.add(tileKey);
          } else if (rng() < enemyChance && !usedTiles.has(tileKey)) {
            // Normal walking enemy
            enemies.push({
              x: gx * TILE_SIZE + 1,
              y: (fy - 1) * TILE_SIZE + 2,
              w: TILE_SIZE - 2,
              h: TILE_SIZE - 2,
              dir: rng() > 0.5 ? 1 : -1,
              speed: 45 + difficulty * 8,
              minX: (gx - 5) * TILE_SIZE,
              maxX: (gx + 5) * TILE_SIZE,
              type: "walk",
              baseY: 0,
              flyTimer: 0,
              flyAmplitude: 0,
            });
            usedTiles.add(tileKey);
          }
          if (rng() < 0.3) {
            coins.push({ x: gx, y: fy - 2, collected: false });
          }
          if (rng() < heartChance) {
            hearts.push({ x: gx, y: fy - 3, collected: false });
          }
        }

        // Moving platforms
        for (let gx = 30; gx < levelW - 30; gx += 25 + Math.floor(rng() * 20)) {
          if (rng() > movPlatChance) continue;
          const base = floorHeights[gx] ?? baseY;
          const py = clamp(base - 4 - Math.floor(rng() * 3), 8, baseY - 3);
          const isVertical = rng() < 0.35;
          movingPlatforms.push({
            x: gx * TILE_SIZE,
            y: py * TILE_SIZE,
            w: 3 * TILE_SIZE,
            h: TILE_SIZE,
            dir: 1,
            speed: 40 + difficulty * 10,
            vertical: isVertical,
            minX: (gx - 4) * TILE_SIZE,
            maxX: (gx + 4) * TILE_SIZE,
            minY: (py - 3) * TILE_SIZE,
            maxY: (py + 3) * TILE_SIZE,
            prevX: gx * TILE_SIZE,
            prevY: py * TILE_SIZE,
          });
          // Coins above moving platforms
          coins.push({ x: gx + 1, y: py - 1, collected: false });
        }

        // Water/lava in gaps
        for (const gap of gaps) {
          for (let i = 0; i < gap.len && gap.x + i < levelW; i++) {
            const wx = gap.x + i;
            const tile = i === 0 ? TILE_WATER_LEFT : i === gap.len - 1 ? TILE_WATER_EDGE_RIGHT : TILE_WATER_MID;
            decorBack.push({ x: wx, y: GRID_H - 2, tile });
            decorBack.push({ x: wx, y: GRID_H - 1, tile: TILE_WATER_EDGE });
          }
        }

        // Checkpoints
        for (let cx = 50; cx < levelW - 40; cx += 55) {
          let gx = cx;
          while (gx < levelW && floorHeights[gx] === null) gx++;
          if (gx >= levelW) break;
          checkpoints.push({ x: gx, y: floorHeights[gx] - 1, active: false });
        }

        // Trees/decorations (world-themed)
        for (let dx = 12; dx < levelW; dx += 20 + Math.floor(rng() * 8)) {
          const fy = floorHeights[dx];
          if (fy === null) continue;
          const treeTile = rng() > 0.5 ? world.trees[0] : world.trees[1];
          decorFront.push({ x: dx, y: fy - 2, tile: treeTile });
          if (rng() < 0.4) {
            decorFront.push({ x: dx + 2, y: fy - 1, tile: world.bush });
          }
        }

        // Clouds (all worlds, but different density)
        const cloudSpacing = worldIdx === 1 ? 28 : 18;
        for (let sx = 8; sx < levelW; sx += cloudSpacing + Math.floor(rng() * 10)) {
          const cloudTile = rng() > 0.5 ? TILE_CLOUD : TILE_CLOUD_SMALL;
          decorBack.push({ x: sx, y: 2 + Math.floor(rng() * 4), tile: cloudTile });
        }

        // Portal
        let portalX = levelW - 6;
        while (portalX > 10 && floorHeights[portalX] === null) portalX--;
        portal = { x: portalX, y: floorHeights[portalX] - 1 };

        // Spawn point
        const spawnX = 4;
        const spawnY = (floorHeights[spawnX] ?? baseY) - 1;
        respawn = { x: spawnX * TILE_SIZE + 1, y: spawnY * TILE_SIZE + 1 };

        for (const starterCoin of starterCoins) {
          coins.push(starterCoin);
        }

        coinsTotal = coins.length + gems.length;
        coinsCollected = 0;
        coinsNeeded = Math.max(1, Math.floor(coinsTotal * 0.75));
      }

      // === LEVEL MANAGEMENT ===
      function loadLevel(index) {
        const config = LEVELS[index % LEVELS.length];
        generateLevel(config);

        player = {
          x: respawn.x,
          y: respawn.y,
          w: TILE_SIZE - 2,
          h: TILE_SIZE - 2,
          vx: 0,
          vy: 0,
          onGround: false,
          coyote: 0,
          jumpBuffer: 0,
          dashTimer: 0,
          dashing: false,
          facing: 1,
          onPlatform: null,
        };

        dashCharge = 0;
        levelElapsed = 0;
        hp = maxHp;
        invuln = 0;
        cameraX = 0;
        cameraY = 0;
      }

      function resetGame() {
        score = 0;
        levelIndex = 0;
        gameOverSent = false;
        loadLevel(levelIndex);
        state = "title";
      }

      // === COLLISION ===
      function isSolidAt(tx, ty) {
        if (ty < 0 || ty >= GRID_H || tx < 0 || tx >= levelW) return false;
        return solid[ty][tx];
      }

      function rectCollidesSolid(rect) {
        const left = Math.floor(rect.x / TILE_SIZE);
        const right = Math.floor((rect.x + rect.w - 1) / TILE_SIZE);
        const top = Math.floor(rect.y / TILE_SIZE);
        const bottom = Math.floor((rect.y + rect.h - 1) / TILE_SIZE);
        for (let y = top; y <= bottom; y++) {
          for (let x = left; x <= right; x++) {
            if (isSolidAt(x, y)) return true;
          }
        }
        return false;
      }

      function rectOnMovingPlatform(rect) {
        const feetY = rect.y + rect.h;
        for (const plat of movingPlatforms) {
          if (
            rect.x + rect.w > plat.x &&
            rect.x < plat.x + plat.w &&
            feetY >= plat.y &&
            feetY <= plat.y + 6 &&
            rect.y < plat.y
          ) {
            return plat;
          }
        }
        return null;
      }

      function moveX(dx) {
        if (!dx) return;
        player.x += dx;
        if (rectCollidesSolid(player)) {
          if (dx > 0) {
            const tx = Math.floor((player.x + player.w - 1) / TILE_SIZE);
            player.x = tx * TILE_SIZE - player.w - 0.01;
          } else {
            const tx = Math.floor(player.x / TILE_SIZE);
            player.x = (tx + 1) * TILE_SIZE + 0.01;
          }
          player.vx = 0;
        }
      }

      function moveY(dy) {
        if (!dy) return;
        player.y += dy;
        if (rectCollidesSolid(player)) {
          if (dy > 0) {
            const ty = Math.floor((player.y + player.h - 1) / TILE_SIZE);
            player.y = ty * TILE_SIZE - player.h - 0.01;
            player.onGround = true;
          } else {
            const ty = Math.floor(player.y / TILE_SIZE);
            player.y = (ty + 1) * TILE_SIZE + 0.01;
          }
          player.vy = 0;
        }
        // Check moving platforms for landing
        if (dy > 0 && !player.onGround) {
          const plat = rectOnMovingPlatform(player);
          if (plat) {
            player.y = plat.y - player.h - 0.01;
            player.vy = 0;
            player.onGround = true;
            player.onPlatform = plat;
          }
        }
      }

      // === ENTITY UPDATES ===
      function updateEnemies(dt) {
        for (const enemy of enemies) {
          if (enemy.type === "fly") {
            enemy.flyTimer += dt * 2.5;
            enemy.y = enemy.baseY + Math.sin(enemy.flyTimer) * enemy.flyAmplitude;
          }
          enemy.x += enemy.dir * enemy.speed * dt;
          if (enemy.x < enemy.minX) {
            enemy.x = enemy.minX;
            enemy.dir = 1;
          }
          if (enemy.x > enemy.maxX) {
            enemy.x = enemy.maxX;
            enemy.dir = -1;
          }
        }
      }

      function updateSaws(dt) {
        for (const saw of saws) {
          saw.angle += dt * 8;
          saw.x += saw.dir * saw.speed * dt;
          if (saw.x < saw.minX) {
            saw.x = saw.minX;
            saw.dir = 1;
          }
          if (saw.x > saw.maxX) {
            saw.x = saw.maxX;
            saw.dir = -1;
          }
        }
      }

      function updateMovingPlatforms(dt) {
        for (const plat of movingPlatforms) {
          plat.prevX = plat.x;
          plat.prevY = plat.y;

          if (plat.vertical) {
            plat.y += plat.dir * plat.speed * dt;
            if (plat.y < plat.minY) { plat.y = plat.minY; plat.dir = 1; }
            if (plat.y > plat.maxY) { plat.y = plat.maxY; plat.dir = -1; }
          } else {
            plat.x += plat.dir * plat.speed * dt;
            if (plat.x < plat.minX) { plat.x = plat.minX; plat.dir = 1; }
            if (plat.x > plat.maxX) { plat.x = plat.maxX; plat.dir = -1; }
          }
        }
      }

      // === COLLECTIBLE CHECKS ===
      function checkCoins() {
        for (const coin of coins) {
          if (coin.collected) continue;
          const coinRect = {
            x: coin.x * TILE_SIZE + 2,
            y: coin.y * TILE_SIZE + 2,
            w: TILE_SIZE - 4,
            h: TILE_SIZE - 4,
          };
          if (rectsOverlap(player, coinRect)) {
            coin.collected = true;
            coinsCollected++;
            score += 100;
            dashCharge = 1;
            haptic();
          }
        }
      }

      function checkGems() {
        for (const gem of gems) {
          if (gem.collected) continue;
          const gemRect = {
            x: gem.x * TILE_SIZE + 2,
            y: gem.y * TILE_SIZE + 2,
            w: TILE_SIZE - 4,
            h: TILE_SIZE - 4,
          };
          if (rectsOverlap(player, gemRect)) {
            gem.collected = true;
            coinsCollected++;
            score += 250;
            dashCharge = 1;
            haptic();
          }
        }
      }

      function checkStars() {
        for (const star of stars) {
          if (star.collected) continue;
          const starRect = {
            x: star.x * TILE_SIZE + 2,
            y: star.y * TILE_SIZE + 2,
            w: TILE_SIZE - 4,
            h: TILE_SIZE - 4,
          };
          if (rectsOverlap(player, starRect)) {
            star.collected = true;
            score += 250;
            if (hp < maxHp) hp++;
            dashCharge = 1;
            haptic();
          }
        }
      }

      function checkHearts() {
        for (const heart of hearts) {
          if (heart.collected) continue;
          const heartRect = {
            x: heart.x * TILE_SIZE + 2,
            y: heart.y * TILE_SIZE + 2,
            w: TILE_SIZE - 4,
            h: TILE_SIZE - 4,
          };
          if (rectsOverlap(player, heartRect)) {
            heart.collected = true;
            if (hp < maxHp) hp++;
            score += 150;
            haptic();
          }
        }
      }

      function checkSprings() {
        for (const spring of springs) {
          const springRect = {
            x: spring.x * TILE_SIZE + 2,
            y: spring.y * TILE_SIZE + 4,
            w: TILE_SIZE - 4,
            h: TILE_SIZE - 6,
          };
          if (rectsOverlap(player, springRect) && player.vy >= 0) {
            player.vy = -SPRING_BOOST;
            player.onGround = false;
            dashCharge = 1;
            haptic();
          }
        }
      }

      function checkCheckpoints() {
        for (const flag of checkpoints) {
          const flagRect = {
            x: flag.x * TILE_SIZE,
            y: flag.y * TILE_SIZE,
            w: TILE_SIZE,
            h: TILE_SIZE,
          };
          if (rectsOverlap(player, flagRect)) {
            if (!flag.active) {
              flag.active = true;
              respawn = { x: flag.x * TILE_SIZE + 1, y: (flag.y - 1) * TILE_SIZE + 1 };
              score += 100;
              haptic();
            }
          }
        }
      }

      // === DAMAGE ===
      function takeDamage() {
        if (invuln > 0 || state !== "playing") return;
        hp -= 1;
        invuln = 1.1;
        shakeTime = 0.25;
        shakeStrength = 4;
        haptic();
        if (hp <= 0) {
          state = "dead";
          sendGameOver();
        } else {
          player.x = respawn.x;
          player.y = respawn.y;
          player.vx = 0;
          player.vy = 0;
        }
      }

      function checkHazards() {
        // Static spikes
        for (const hazard of hazards) {
          const hazardRect = {
            x: hazard.x * TILE_SIZE,
            y: hazard.y * TILE_SIZE,
            w: TILE_SIZE,
            h: TILE_SIZE,
          };
          if (rectsOverlap(player, hazardRect)) {
            takeDamage();
            return;
          }
        }
        // Moving saw blades
        for (const saw of saws) {
          const sawRect = {
            x: saw.x + 2,
            y: saw.y + 2,
            w: TILE_SIZE - 4,
            h: TILE_SIZE - 4,
          };
          if (rectsOverlap(player, sawRect)) {
            takeDamage();
            return;
          }
        }
        // Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
          const enemy = enemies[i];
          if (rectsOverlap(player, enemy)) {
            if (player.dashing || player.vy > 120) {
              enemies.splice(i, 1);
              player.vy = -JUMP_SPEED * 0.45;
              score += enemy.type === "fast" ? 250 : enemy.type === "fly" ? 200 : 150;
              haptic();
            } else {
              takeDamage();
              return;
            }
          }
        }
        // Fall death
        if (player.y > worldH + TILE_SIZE) {
          takeDamage();
        }
      }

      function checkPortal() {
        if (!portal) return false;
        const portalRect = {
          x: portal.x * TILE_SIZE,
          y: portal.y * TILE_SIZE,
          w: TILE_SIZE,
          h: TILE_SIZE,
        };
        if (rectsOverlap(player, portalRect)) {
          if (coinsCollected < coinsNeeded) {
            shakeTime = 0.15;
            shakeStrength = 2;
            haptic();
            return false;
          }
          haptic();
          return true;
        }
        return false;
      }

      function completeLevel() {
        if (levelIndex >= LEVELS.length - 1) {
          state = "gameComplete";
          haptic();
          sendGameOver();
          return;
        }
        state = "levelComplete";
        levelTimer = 1.3;
        score += 500;
        score += hp * 100;
      }

      // === MAIN UPDATE ===
      function update(dt) {
        gameTime += dt;

        if (state === "title") {
          if (Object.keys(pressed).length > 0) {
            state = "charSelect";
          }
          pressedClear();
          return;
        }

        if (state === "charSelect") {
          charSelectBlink += dt;
          if (pressed["ArrowLeft"] || pressed["KeyA"]) {
            selectedChar = (selectedChar + CHARACTERS.length - 1) % CHARACTERS.length;
            haptic();
          }
          if (pressed["ArrowRight"] || pressed["KeyD"]) {
            selectedChar = (selectedChar + 1) % CHARACTERS.length;
            haptic();
          }
          if (pressed["ArrowUp"] || pressed["KeyW"] || pressed["Space"] || pressed["Enter"]) {
            state = "playing";
            haptic();
          }
          pressedClear();
          return;
        }

        if (state === "playing") {
          levelElapsed += dt;
          if (invuln > 0) invuln -= dt;
          if (shakeTime > 0) shakeTime -= dt;

          const left = keys["ArrowLeft"] || keys["KeyA"];
          const right = keys["ArrowRight"] || keys["KeyD"];
          const jumpPressed = pressed["ArrowUp"] || pressed["KeyW"] || pressed["Space"];
          const dashPressed = pressed["ShiftLeft"] || pressed["ShiftRight"] || pressed["KeyX"];

          if (left) player.facing = -1;
          if (right) player.facing = 1;

          if (left) player.vx -= MOVE_ACCEL * dt;
          if (right) player.vx += MOVE_ACCEL * dt;
          if (!left && !right) player.vx *= FRICTION;
          player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));

          if (player.onGround) {
            player.coyote = COYOTE_TIME;
          } else {
            player.coyote -= dt;
          }

          if (jumpPressed) {
            player.jumpBuffer = JUMP_BUFFER;
          } else {
            player.jumpBuffer -= dt;
          }

          if (player.jumpBuffer > 0 && player.coyote > 0) {
            player.vy = -JUMP_SPEED;
            player.onGround = false;
            player.jumpBuffer = 0;
            player.coyote = 0;
            haptic();
          }

          if (dashPressed && dashCharge > 0 && !player.dashing) {
            const dir = left ? -1 : right ? 1 : player.facing;
            player.dashing = true;
            player.dashTimer = DASH_TIME;
            player.vy = 0;
            player.vx = dir * DASH_SPEED;
            dashCharge = 0;
            haptic();
          }

          if (player.dashing) {
            player.dashTimer -= dt;
            if (player.dashTimer <= 0) {
              player.dashing = false;
            }
          } else {
            player.vy += GRAVITY * dt;
          }

          // Moving platforms update (before player movement)
          updateMovingPlatforms(dt);

          // Apply platform carry
          player.onPlatform = null;
          const ridingPlat = rectOnMovingPlatform(player);
          if (ridingPlat && player.vy >= 0) {
            const dx = ridingPlat.x - ridingPlat.prevX;
            const dy = ridingPlat.y - ridingPlat.prevY;
            player.x += dx;
            player.y += dy;
            player.onPlatform = ridingPlat;
          }

          player.onGround = false;
          moveX(player.vx * dt);
          moveY(player.vy * dt);

          updateEnemies(dt);
          updateSaws(dt);
          checkCoins();
          checkGems();
          checkStars();
          checkHearts();
          checkSprings();
          checkCheckpoints();
          checkHazards();
          if (checkPortal()) {
            completeLevel();
          }
        } else if (state === "levelComplete") {
          levelTimer -= dt;
          if (levelTimer <= 0) {
            levelIndex++;
            loadLevel(levelIndex);
            state = "playing";
          }
        }

        if (pressed["KeyR"] && (state === "dead" || state === "gameComplete")) {
          resetGame();
        }

        pressedClear();
      }

      function pressedClear() {
        for (const key in pressed) {
          if (Object.prototype.hasOwnProperty.call(pressed, key)) {
            delete pressed[key];
          }
        }
      }

      // === CAMERA ===
      function updateCamera() {
        if (!player) return;
        const targetX = player.x + player.w / 2 - canvas.width / 2;
        const targetY = player.y + player.h / 2 - canvas.height / 2;
        const maxX = Math.max(0, worldW - canvas.width);
        const maxY = Math.max(0, worldH - canvas.height);
        cameraX += (clamp(targetX, 0, maxX) - cameraX) * 0.12;
        cameraY += (clamp(targetY, 0, maxY) - cameraY) * 0.12;
      }

      // === RENDERING ===
      function drawTile(index, x, y) {
        const sx = (index % 15) * 8;
        const sy = Math.floor(index / 15) * 8;
        ctx.drawImage(tilemap, sx, sy, 8, 8, x, y, TILE_SIZE, TILE_SIZE);
      }

      function drawNumberTiles(value, x, y) {
        const str = String(value);
        for (let i = 0; i < str.length; i++) {
          const digit = str.charCodeAt(i) - 48;
          if (digit >= 0 && digit <= 9) {
            drawTile(DIGIT_TILES[digit], x + i * TILE_SIZE, y);
          }
        }
      }

      function getCurrentWorld() {
        const config = LEVELS[levelIndex % LEVELS.length];
        return WORLDS[config.world];
      }

      function draw() {
        const world = getCurrentWorld();
        ctx.fillStyle = world.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (!tilemap.complete) return;

        updateCamera();
        const shake = shakeTime > 0 ? Math.sin(shakeTime * 60) * shakeStrength : 0;

        ctx.save();
        ctx.translate(-cameraX + shake, -cameraY + shake);

        // Background decorations
        for (const deco of decorBack) {
          drawTile(deco.tile, deco.x * TILE_SIZE, deco.y * TILE_SIZE);
        }

        // Visible tile range for ground
        const visMinX = Math.max(0, Math.floor(cameraX / TILE_SIZE) - 1);
        const visMaxX = Math.min(levelW - 1, Math.ceil((cameraX + canvas.width) / TILE_SIZE) + 1);
        const visMinY = Math.max(0, Math.floor(cameraY / TILE_SIZE) - 1);
        const visMaxY = Math.min(GRID_H - 1, Math.ceil((cameraY + canvas.height) / TILE_SIZE) + 1);

        const config = LEVELS[levelIndex % LEVELS.length];
        const fillTile = world.groundFill;

        for (let y = visMinY; y <= visMaxY; y++) {
          for (let x = visMinX; x <= visMaxX; x++) {
            if (!solid[y][x]) continue;
            const top = !isSolidAt(x, y - 1);
            drawTile(top ? groundTop[x] : fillTile, x * TILE_SIZE, y * TILE_SIZE);
          }
        }

        // Foreground decorations
        for (const deco of decorFront) {
          drawTile(deco.tile, deco.x * TILE_SIZE, deco.y * TILE_SIZE);
        }

        // Moving platforms
        for (const plat of movingPlatforms) {
          const tilesWide = Math.round(plat.w / TILE_SIZE);
          for (let i = 0; i < tilesWide; i++) {
            drawTile(TILE_PLATFORM_BLOCK, plat.x + i * TILE_SIZE, plat.y);
          }
        }

        // Springs
        for (const spring of springs) {
          drawTile(TILE_SPRING, spring.x * TILE_SIZE, spring.y * TILE_SIZE);
        }

        // Hazards (spikes)
        for (const hazard of hazards) {
          drawTile(TILE_SPIKE, hazard.x * TILE_SIZE, hazard.y * TILE_SIZE);
        }

        // Saw blades (with rotation effect)
        for (const saw of saws) {
          ctx.save();
          const cx = saw.x + TILE_SIZE / 2;
          const cy = saw.y + TILE_SIZE / 2;
          ctx.translate(cx, cy);
          ctx.rotate(saw.angle);
          drawTile(TILE_SAW, -TILE_SIZE / 2, -TILE_SIZE / 2);
          ctx.restore();
        }

        // Coins
        for (const coin of coins) {
          if (coin.collected) continue;
          drawTile(TILE_COIN, coin.x * TILE_SIZE, coin.y * TILE_SIZE);
        }

        // Gems (with subtle bob animation)
        for (const gem of gems) {
          if (gem.collected) continue;
          const bob = Math.sin(gameTime * 3 + gem.x) * 2;
          drawTile(gem.tile, gem.x * TILE_SIZE, gem.y * TILE_SIZE + bob);
        }

        // Stars
        for (const star of stars) {
          if (star.collected) continue;
          drawTile(TILE_STAR, star.x * TILE_SIZE, star.y * TILE_SIZE);
        }

        // Hearts
        for (const heart of hearts) {
          if (heart.collected) continue;
          drawTile(TILE_HEART_FULL, heart.x * TILE_SIZE, heart.y * TILE_SIZE);
        }

        // Checkpoints
        for (const flag of checkpoints) {
          drawTile(TILE_FLAG, flag.x * TILE_SIZE, flag.y * TILE_SIZE);
        }

        // Enemies
        for (const enemy of enemies) {
          let tile = TILE_ENEMY;
          if (enemy.type === "fly") tile = TILE_ENEMY_FLY;
          if (enemy.type === "fast") tile = TILE_ENEMY_FAST;
          drawTile(tile, enemy.x, enemy.y);
        }

        // Portal
        if (portal) {
          drawTile(TILE_PORTAL, portal.x * TILE_SIZE, portal.y * TILE_SIZE);
          if (coinsCollected < coinsNeeded) {
            drawTile(TILE_PORTAL_LOCK, portal.x * TILE_SIZE, (portal.y - 1) * TILE_SIZE);
          } else {
            ctx.fillStyle = "rgba(80, 160, 255, 0.25)";
            ctx.beginPath();
            ctx.arc(
              portal.x * TILE_SIZE + TILE_SIZE / 2,
              portal.y * TILE_SIZE + TILE_SIZE / 2,
              TILE_SIZE * 0.7 + Math.sin(gameTime * 4) * 2,
              0,
              Math.PI * 2
            );
            ctx.fill();
          }
        }

        // Player
        if (player) {
          const blink = invuln > 0 && Math.floor(invuln * 10) % 2 === 0;
          if (!blink) {
            const charTile = CHARACTERS[selectedChar];
            if (player.facing < 0) {
              ctx.save();
              ctx.translate(player.x + player.w / 2, 0);
              ctx.scale(-1, 1);
              drawTile(charTile, -player.w / 2, player.y);
              ctx.restore();
            } else {
              drawTile(charTile, player.x, player.y);
            }
          }
        }

        ctx.restore();

        drawHud();

        // Overlays
        if (state === "title") {
          drawOverlay("PORTAL PULSE", "Press any key to start");
        } else if (state === "charSelect") {
          drawCharSelect();
        } else if (state === "dead") {
          drawOverlay("Game Over", "Press R or Play Again");
        } else if (state === "gameComplete") {
          drawOverlay("You Escaped!", "All 30 levels cleared!");
        } else if (state === "levelComplete") {
          const nextWorld = LEVELS[(levelIndex + 1) % LEVELS.length].world;
          const currentWorld = LEVELS[levelIndex % LEVELS.length].world;
          if (nextWorld !== currentWorld && levelIndex < LEVELS.length - 1) {
            drawOverlay("World Clear!", WORLDS[nextWorld].name + " awaits...");
          } else {
            drawOverlay("Level Clear", "Get Ready...");
          }
        }
      }

      function drawCharSelect() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "16px monospace";
        ctx.fillText("Choose Your Character", canvas.width / 2, 160);

        // Draw 4 characters
        const startX = (canvas.width - (4 * 40)) / 2 + 12;
        const charY = 200;

        for (let i = 0; i < CHARACTERS.length; i++) {
          const cx = startX + i * 40;

          // Selection highlight
          if (i === selectedChar) {
            ctx.fillStyle = "rgba(255, 255, 100, 0.3)";
            ctx.fillRect(cx - 6, charY - 6, 28, 44);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.strokeRect(cx - 6, charY - 6, 28, 44);

            // Arrow indicator
            const arrowBob = Math.sin(charSelectBlink * 5) * 2;
            ctx.fillStyle = "#fff";
            ctx.font = "12px monospace";
            ctx.textAlign = "center";
            ctx.fillText("\u25BC", cx + 7, charY - 10 + arrowBob);
          }

          drawTile(CHARACTERS[i], cx, charY);

          // Character name
          ctx.fillStyle = i === selectedChar ? "#fff" : "#aaa";
          ctx.font = "8px monospace";
          ctx.textAlign = "center";
          ctx.fillText(CHAR_NAMES[i], cx + 8, charY + 30);
        }

        ctx.fillStyle = "#ccc";
        ctx.font = "10px monospace";
        ctx.textAlign = "center";
        ctx.fillText("<  Arrow Keys to Select  >", canvas.width / 2, 280);
        ctx.fillText("Jump / Space to Confirm", canvas.width / 2, 296);
        ctx.textAlign = "left";
      }

      function drawHud() {
        const hudX = 8;
        const hudY = 8;
        drawNumberTiles(score, hudX, hudY);

        const coinsLeft = Math.max(0, coinsNeeded - coinsCollected);
        drawTile(TILE_COIN, hudX, hudY + 20);
        drawNumberTiles(coinsLeft, hudX + 18, hudY + 20);

        const timeSec = Math.floor(levelElapsed);
        const min = Math.floor(timeSec / 60);
        const sec = timeSec % 60;
        const minStr = String(min);
        const secStr = (sec < 10 ? "0" : "") + sec;
        let tx = hudX;
        drawNumberTiles(minStr, tx, hudY + 40);
        tx += minStr.length * TILE_SIZE;
        ctx.fillStyle = "#2b2b2b";
        ctx.fillRect(tx + 5, hudY + 44, 3, 3);
        ctx.fillRect(tx + 5, hudY + 52, 3, 3);
        tx += 12;
        drawNumberTiles(secStr, tx, hudY + 40);

        // Level + world indicator
        const world = getCurrentWorld();
        ctx.fillStyle = "#2b2b2b";
        ctx.font = "9px monospace";
        ctx.fillText(world.name, canvas.width - 80, hudY + 48);
        ctx.font = "10px monospace";
        ctx.fillText("Lv " + (levelIndex + 1) + "/30", canvas.width - 56, hudY + 60);

        // Hearts
        for (let i = 0; i < maxHp; i++) {
          const tile = i < hp ? TILE_HEART_FULL : TILE_HEART_EMPTY;
          drawTile(tile, canvas.width - (i + 1) * TILE_SIZE - 8, 8);
        }

        // Dash indicator
        const dashTile = dashCharge > 0 ? TILE_STAR : TILE_STAR_EMPTY;
        drawTile(dashTile, canvas.width - TILE_SIZE - 8, 28);
      }

      function drawOverlay(title, subtitle) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "20px monospace";
        ctx.fillText(title, canvas.width / 2, 210);
        ctx.font = "12px monospace";
        ctx.fillText(subtitle, canvas.width / 2, 234);
        ctx.font = "9px monospace";
        ctx.fillText("Move: Arrows/A-D", canvas.width / 2, 258);
        ctx.fillText("Jump: W/Up/Space | Dash: Shift/X", canvas.width / 2, 272);
        ctx.textAlign = "left";
      }

      // === GAME LOOP ===
      function step(dt) {
        if (state !== "loading") {
          update(dt);
          draw();
        }
      }

      function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const dt = Math.min(0.033, (timestamp - lastTime) / 1000);
        lastTime = timestamp;
        if (!manualAdvance) {
          step(dt);
        }
        requestAnimationFrame(gameLoop);
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
        setCanvasScale();
      }

      // === INPUT HANDLERS ===
      function handleKeyDown(e) {
        if (!keys[e.code]) {
          pressed[e.code] = true;
        }
        keys[e.code] = true;

        if (e.code === "KeyF") {
          toggleFullscreen();
        }
        if (e.code === "Escape" && document.fullscreenElement) {
          document.exitFullscreen?.();
        }
      }

      function handleKeyUp(e) {
        keys[e.code] = false;
      }

      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);
      window.addEventListener("resize", setCanvasScale);

      // Touch controls
      const touchState = {};
      function bindTouch(id, code) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("touchstart", (e) => { e.preventDefault(); touchState[code] = true; keys[code] = true; pressed[code] = true; }, { passive: false });
        el.addEventListener("touchend", (e) => { e.preventDefault(); touchState[code] = false; keys[code] = false; }, { passive: false });
        el.addEventListener("touchcancel", (e) => { touchState[code] = false; keys[code] = false; });
      }
      bindTouch("btn-left", "ArrowLeft");
      bindTouch("btn-right", "ArrowRight");
      bindTouch("btn-jump", "Space");
      bindTouch("btn-dash", "ShiftLeft");

      canvas.addEventListener("touchstart", (e) => {
        if (state === "title" || state === "dead" || state === "gameComplete") {
          e.preventDefault();
          if (state === "title") { pressed["Space"] = true; }
          else { pressed["KeyR"] = true; }
        }
      }, { passive: false });

      // === SDK ===
      setupSDK();
      window.addEventListener("load", setupSDK);

      // === DEBUG/TEST HOOKS ===
      window.advanceTime = (ms) => {
        manualAdvance = true;
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let i = 0; i < steps; i++) {
          update(1 / 60);
        }
        draw();
      };

      window.render_game_to_text = () => {
        const config = LEVELS[levelIndex % LEVELS.length];
        const payload = {
          mode: state,
          level: levelIndex + 1,
          levelCount: LEVELS.length,
          world: WORLDS[config.world].name,
          coords: "origin top-left, +x right, +y down (pixels)",
          player: player
            ? {
                x: Math.round(player.x),
                y: Math.round(player.y),
                vx: Number(player.vx.toFixed(2)),
                vy: Number(player.vy.toFixed(2)),
                onGround: player.onGround,
                character: CHAR_NAMES[selectedChar],
              }
            : null,
          camera: { x: Math.round(cameraX), y: Math.round(cameraY) },
          health: { current: hp, max: maxHp, invuln: Number(invuln.toFixed(2)) },
          dash: { ready: dashCharge > 0, timer: Number(player?.dashTimer?.toFixed(2) ?? 0) },
          coins: { collected: coinsCollected, needed: coinsNeeded, total: coinsTotal },
          score,
          portalLocked: coinsCollected < coinsNeeded,
          time: Number(levelElapsed.toFixed(2)),
          enemies: enemies.map((e) => ({ x: Math.round(e.x), y: Math.round(e.y), dir: e.dir, type: e.type })),
          saws: saws.length,
          movingPlatforms: movingPlatforms.length,
          gems: gems.filter((g) => !g.collected).length,
        };
        return JSON.stringify(payload);
      };

      // === INIT ===
      const tilemap = new Image();
      tilemap.src = "Default/Tilemap/tilemap_packed.png";

      let lastTime = 0;

      tilemap.onload = () => {
        state = "title";
        resetGame();
        setCanvasScale();
        requestAnimationFrame(gameLoop);
      };
    })();
  </script>
</body>
</html>
